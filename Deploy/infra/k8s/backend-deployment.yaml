apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: influencer-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/influencer-platform-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: '4000'
            - name: FRONTEND_ORIGIN
              value: 'https://admin.example.com'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: jwt-refresh-secret
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: admin-password
