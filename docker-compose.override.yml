services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./Backend:/app
    environment:
      PORT: ${PORT:-4000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-strong-refresh-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      ACCESS_TOKEN_MAX_AGE_MS: ${ACCESS_TOKEN_MAX_AGE_MS:-21600000}
      REFRESH_TOKEN_MAX_AGE_MS: ${REFRESH_TOKEN_MAX_AGE_MS:-2592000000}
      CSRF_TOKEN_MAX_AGE_MS: ${CSRF_TOKEN_MAX_AGE_MS:-2592000000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    volumes:
      - ./Frontend:/app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/v1}
    depends_on:
      - backend
