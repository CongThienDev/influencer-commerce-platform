services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-influencer_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    environment:
      PORT: ${PORT:-4000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-strong-refresh-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      ACCESS_TOKEN_MAX_AGE_MS: ${ACCESS_TOKEN_MAX_AGE_MS:-21600000}
      REFRESH_TOKEN_MAX_AGE_MS: ${REFRESH_TOKEN_MAX_AGE_MS:-2592000000}
      CSRF_TOKEN_MAX_AGE_MS: ${CSRF_TOKEN_MAX_AGE_MS:-2592000000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/influencer_platform}
      DB_SSL: ${DB_SSL:-false}
      DB_SEED_ON_BOOT: ${DB_SEED_ON_BOOT:-false}
      PUBLIC_RATE_LIMIT_MAX: ${PUBLIC_RATE_LIMIT_MAX:-120}
      PUBLIC_RATE_LIMIT_WINDOW_MS: ${PUBLIC_RATE_LIMIT_WINDOW_MS:-60000}
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/v1}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
